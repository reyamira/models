name: Build with Nix
on:
  workflow_dispatch:
  pull_request:
    paths-ignore:
      - "**/*.md"
      - "website/**"
      - "docs/**"
      - "public/**"
      - "LICENSE"
  push:
    branches:
      - main
    paths-ignore:
      - "**/*.md"
      - "website/**"
      - "docs/**"
      - "public/**"
      - "LICENSE"

# Keep only the newest run per PR or ref so force-pushes do not leave stale
# Nix builds queued behind newer commits.
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  nix:
    name: Nix / ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - ubuntu-24.04-arm
          - macos-latest
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout tree
        uses: actions/checkout@v6
      - name: Install Nix
        uses: DeterminateSystems/determinate-nix-action@v3
      # Cachix is a real binary cache (CDN-backed, shared across PRs, main,
      # local dev, and end users) — replaces the CI-only GitHub Actions cache,
      # whose slow Darwin uploads blew the 30-min job timeout. Fork PRs get no
      # authToken and fall back to read-only pulls from the public cache.
      - name: Enable Cachix
        uses: cachix/cachix-action@v17
        with:
          name: modelsdev
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"
      - name: Build Packages / ${{ matrix.os }}
        run: nix build .
      - name: Check Flake / ${{ matrix.os }}
        run: nix flake check
