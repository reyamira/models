name = "models-benchmark-trigger"
main = "src/index.ts"
compatibility_date = "2026-05-01"

# Active fallback for GitHub Actions cron throttling.
# Fires hourly at :17, complementary to the GH Actions slots at :13 and :43.
# Duplicate runs are harmless — the workflow's `git diff --quiet` step
# skips the redundant commit when no data changed.

[triggers]
crons = ["17 * * * *"]
